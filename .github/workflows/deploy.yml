name: App zu GitHub Pages deployen

# Deployment der Graph-RAG-Lab-App als statische Seite.
# Voraussetzung: In den Repo-Einstellungen unter Pages die Quelle
# "GitHub Actions" wählen. Manuell auslösbar über "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/configure-pages@v6
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          # Oeffentliche Client-Konfiguration. Der Modellschluessel liegt
          # ausschliesslich als Secret in der Supabase Edge Function.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
